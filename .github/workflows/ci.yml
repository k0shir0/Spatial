name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Install Spatial
        run: python -m pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src

      - name: Run tests
        run: pytest -q

      - name: Prove deterministic synthetic GLB build
        run: |
          python scripts/make_demo_inputs.py --output examples/demo
          spatial-parametric --config examples/parametric_phone.json --output /tmp/spatial-a --skip-usdz
          spatial-parametric --config examples/parametric_phone.json --output /tmp/spatial-b --skip-usdz
          cmp /tmp/spatial-a/spatial_demo_phone.glb /tmp/spatial-b/spatial_demo_phone.glb
          cmp /tmp/spatial-a/manifest.json /tmp/spatial-b/manifest.json

  native-swift:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package: [ObjectCaptureCLI, VisionClassifyCLI, VisionMaskCLI]

    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: swift build --package-path native/${{ matrix.package }}

      - name: Test (where a test target exists)
        run: |
          if [ -d "native/${{ matrix.package }}/Tests" ]; then
            swift test --package-path native/${{ matrix.package }}
          fi
