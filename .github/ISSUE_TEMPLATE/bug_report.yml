name: Bug report
description: Report a reproducible problem using synthetic or non-sensitive inputs.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach private captures, faces, screens, credentials, or textured outputs.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: Commit SHA or release tag
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include commands and a synthetic configuration if possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
      description: Remove absolute paths and personal data before posting.
    validations:
      required: true
